{% extends "website/base.html" %}
{% load static %}

{% block title %}Admin Panel - Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100" dir="rtl">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-md p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">پنل مدیریت</h1>
                <p class="text-gray-500 mt-2">ورود به پنل مدیریت HeyMedic</p>
            </div>

            {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-center">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">شماره موبایل</label>
                    <input type="tel" name="phone_number" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-center text-lg"
                           placeholder="09123456789" dir="ltr">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">رمز عبور</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="رمز عبور خود را وارد کنید">
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-bold text-lg">
                    ورود
                </button>
            </form>

            <div class="text-center mt-6">
                <a href="{% url 'website:home_page' %}" class="text-blue-600 hover:underline">
                    بازگشت به صفحه اصلی
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
