<div class="fixed right-0 top-0 h-full w-64 bg-gray-900 text-white shadow-lg z-50">
    <div class="p-6 border-b border-gray-700">
        <h2 class="text-xl font-bold">HeyMedic Panel</h2>
        <p class="text-gray-400 text-sm mt-1">پنل مدیریت</p>
    </div>

    <nav class="p-4">
        <a href="{% url 'website:admin_dashboard' %}"
           class="flex items-center px-4 py-3 rounded-lg mb-2 hover:bg-gray-800 transition
                  {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-blue-600{% endif %}">
            <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            داشبورد
        </a>

        <div class="mt-6 mb-2 px-4 text-xs text-gray-500 uppercase tracking-wider">مدیریت کاربران</div>

        <a href="{% url 'website:admin_user_list' %}"
           class="flex items-center px-4 py-3 rounded-lg mb-2 hover:bg-gray-800 transition
                  {% if 'user' in request.resolver_match.url_name %}bg-gray-800{% endif %}">
            <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            کاربران
        </a>

        <a href="{% url 'website:admin_doctor_list' %}"
           class="flex items-center px-4 py-3 rounded-lg mb-2 hover:bg-gray-800 transition
                  {% if 'doctor' in request.resolver_match.url_name %}bg-gray-800{% endif %}">
            <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>

        </a>

        <a href="{% url 'website:admin_patient_list' %}"
           class="flex items-center px-4 py-3 rounded-lg mb-2 hover:bg-gray-800 transition
                  {% if 'patient' in request.resolver_match.url_name %}bg-gray-800{% endif %}">
            <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            بیماران
        </a>

        <a href="{% url 'website:admin_specialty_list' %}"
           class="flex items-center px-4 py-3 rounded-lg mb-2 hover:bg-gray-800 transition
                  {% if 'specialty' in request.resolver_match.url_name %}bg-gray-800{% endif %}">
            <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
            </svg>
            تخصص‌ها
        </a>

        <div class="mt-6 mb-2 px-4 text-xs text-gray-500 uppercase tracking-wider">مدیریت نوبت‌ها</div>

        <a href="{% url 'website:admin_timeslot_list' %}"
           class="flex items-center px-4 py-3 rounded-lg mb-2 hover:bg-gray-800 transition
                  {% if 'timeslot' in request.resolver_match.url_name %}bg-gray-800{% endif %}">
            <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>

        </a>

        <a href="{% url 'website:admin_appointment_list' %}"
           class="flex items-center px-4 py-3 rounded-lg mb-2 hover:bg-gray-800 transition
                  {% if 'appointment' in request.resolver_match.url_name %}bg-gray-800{% endif %}">
            <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>

        </a>

        <div class="mt-6 mb-2 px-4 text-xs text-gray-500 uppercase tracking-wider">مدیریت مالی</div>

        <a href="{% url 'website:admin_payment_list' %}"
           class="flex items-center px-4 py-3 rounded-lg mb-2 hover:bg-gray-800 transition
                  {% if 'payment' in request.resolver_match.url_name %}bg-gray-800{% endif %}">
            <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
            </svg>
            پرداخت‌ها
        </a>

        <div class="mt-6 mb-2 px-4 text-xs text-gray-500 uppercase tracking-wider">مدیریت نظرات</div>

        <a href="{% url 'website:admin_review_list' %}"
           class="flex items-center px-4 py-3 rounded-lg mb-2 hover:bg-gray-800 transition
                  {% if 'review' in request.resolver_match.url_name %}bg-gray-800{% endif %}">
            <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>

            نظرات
        </a>

        <div class="mt-8 pt-6 border-t border-gray-700">
            <a href="{% url 'website:home_page' %}"
               class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-400">
                <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                بازگشت به سایت
            </a>

            <a href="{% url 'website:logout' %}"
               class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-800 transition text-red-400 mt-2">
                <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>

                خروج
            </a>
        </div>
    </nav>
</div>
