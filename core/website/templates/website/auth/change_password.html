{% extends "website/base.html" %}

{% block title %}تغییر رمز عبور - HeyMedic{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h1 class="text-2xl font-bold text-gray-800 text-center mb-6">تغییر رمز عبور</h1>

            {% if messages %}
                {% for msg in messages %}
                    <div class="px-4 py-3 rounded-xl mb-6 text-sm
                        {% if msg.tags == 'success' %}bg-green-50 border border-green-200 text-green-700
                        {% else %}bg-red-50 border border-red-200 text-red-700{% endif %}">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">رمز عبور فعلی</label>
                    <input type="password" name="old_password" required
                        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">رمز عبور جدید</label>
                    <input type="password" name="new_password1" required
                        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">تکرار رمز عبور جدید</label>
                    <input type="password" name="new_password2" required
                        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-primary-600 text-white py-3 rounded-xl font-bold hover:bg-primary-700 transition">
                    تغییر رمز عبور
                </button>
            </form>

            <p class="text-center mt-6">
                <a href="{% url 'website:user_profile' %}" class="text-primary-600 hover:text-primary-700 text-sm font-medium">
                    بازگشت به پروفایل
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
